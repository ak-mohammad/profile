---
layout: default
---
<section class="section page-section">
  <div class="container container-narrow">
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>
    <div class="page-content html-content">
      {{ content }}
    </div>
  </div>
</section>
